<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Gallery | The Cellar Paphos</title>

    <style>
        body {
            margin: 0;
            background: #f5f5f5;
            font-family: Arial, Helvetica, sans-serif;
        }

        h1 {
            text-align: center;
            padding: 30px 20px;
            margin: 0;
            font-size: 2rem;
            font-weight: 600;
        }

        .gallery {
            width: 95%;
            max-width: 1200px;
            margin: 0 auto 40px auto;

            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .gallery img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 8px;
            box-shadow: 0 3px 12px rgba(0,0,0,0.15);
        }

        @media (max-width: 768px) {
            .gallery {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

<h1>Photo Gallery</h1>

<div class="gallery">

    <img src="images/gallery/IMG1.JPG" alt="Photo 1">

    <img src="images/gallery/IMG2.JPG" alt="Photo 2">

    <img src="images/gallery/IMG3.JPG" alt="Photo 3">

    <img src="images/gallery/IMG4.JPG" alt="Photo 4">

</div>

</body>
</html>
